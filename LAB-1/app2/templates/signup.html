<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0e8; --ink: #1a1714; --accent: #c0392b;
      --muted: #8a7f72; --card: #fffdf8; --border: #ddd5c5;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 4rem;
      border-bottom: 1px solid var(--border);
      animation: fadeDown 0.6s ease both;
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; }
    .logo span { color: var(--accent); }
    .center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      animation: fadeUp 0.8s ease 0.2s both;
    }
    .box {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 3rem;
      width: 100%;
      max-width: 420px;
    }
    .box h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 0.4rem; }
    .box h2 em { color: var(--accent); font-style: italic; }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
    label {
      display: block;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--ink);
      margin-bottom: 1.25rem;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: var(--ink); }
    button {
      width: 100%;
      padding: 0.9rem;
      background: var(--ink);
      color: var(--bg);
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.25s;
    }
    button:hover { background: var(--accent); }
    .error {
      background: #fdecea;
      color: var(--accent);
      border: 1px solid #f5c6c2;
      padding: 0.7rem 1rem;
      font-size: 0.88rem;
      margin-bottom: 1.25rem;
    }
    .success {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #c8e6c9;
      padding: 0.7rem 1rem;
      font-size: 0.88rem;
      margin-bottom: 1.25rem;
    }
    .link {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.88rem;
      color: var(--muted);
    }
    .link a { color: var(--ink); text-decoration: none; font-weight: 500; }
    .link a:hover { color: var(--accent); }
    footer {
      border-top: 1px solid var(--border);
      padding: 1.2rem 4rem;
      font-size: 0.82rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo">My<span>Flask</span></div>
  </nav>
  <div class="center">
    <div class="box">
      <h2>Create <em>account.</em></h2>
      <p class="subtitle">Sign up to get started.</p>
      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}
      {% if success %}
        <div class="success">{{ success }}</div>
      {% endif %}
      <form method="POST" action="/signup">
        <label>Username</label>
        <input type="text" name="username" placeholder="Choose a username" required/>
        <label>Password</label>
        <input type="password" name="password" placeholder="Choose a password" required/>
        <label>Confirm Password</label>
        <input type="password" name="confirm" placeholder="Repeat your password" required/>
        <button type="submit">Create Account</button>
      </form>
      <div class="link">Already have an account? <a href="/login">Sign in</a></div>
    </div>
  </div>
  <footer>
    <span>My Flask App</span>
    <span>Built with Python &amp; Flask</span>
  </footer>
</body>
</html>
